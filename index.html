<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Thae</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ff6b81;
            font-family: 'Dancing Script', cursive; /* စာလုံးပုံစံ အဆန်း */
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .container { position: relative; z-index: 2; text-align: center; }

        /* Start Button */
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: #ff6b81;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Pacifico', cursive;
            box-shadow: 0 0 20px rgba(255, 107, 129, 0.5);
        }

        .message {
            font-size: 4rem; /* စာလုံးကြီးကြီး */
            display: none;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            text-shadow: 0 0 15px rgba(255, 107, 129, 0.8);
            animation: fadeInOut 2s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-5deg); filter: blur(10px); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(0deg); filter: blur(0); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3) rotate(5deg); filter: blur(10px); }
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .photo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 4px solid #fff;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 107, 129, 0.6);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <audio id="mySong">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="start-btn">Open Your Surprise ✨</button>

        <div id="text-container" class="hidden">
            <h1 class="message">I'm</h1>
            <h1 class="message">Truly</h1>
            <h1 class="message">Sorry</h1>
            <h1 class="message">My</h1>
            <h1 class="message">Thae"</h1>
            <h1 class="message">Pisi ly</h1>
        </div>

        <div id="photo-album" class="photo-grid hidden">
            <img src="img1.jpg" class="photo">
            <img src="img2.jpg" class="photo">
            <img src="img3.jpg" class="photo">
            <img src="img4.jpg" class="photo">
        </div>
    </div>

    <script>
        // Matrix Falling Hearts
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const hearts = "❤️💕💖💗";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff6b81";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = hearts[Math.floor(Math.random() * hearts.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Music and Animation Control
        const startBtn = document.getElementById('start-btn');
        const song = document.getElementById('mySong');
        const messages = document.querySelectorAll('.message');
        const album = document.getElementById('photo-album');
        const textContainer = document.getElementById('text-container');

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            textContainer.classList.remove('hidden');

            // Music start at 43 seconds
            song.currentTime = 43; 
            song.play();

            let delay = 0;
            messages.forEach((msg, index) => {
                setTimeout(() => {
                    msg.style.display = 'block';
                    setTimeout(() => {
                        msg.style.display = 'none';
                        if (index === messages.length - 1) {
                            textContainer.style.display = 'none';
                            album.classList.remove('hidden');
                            setTimeout(() => album.style.opacity = '1', 100);
                        }
                    }, 1900);
                }, delay);
                delay += 2000;
            });
        });
    </script>
</body>
</html>
