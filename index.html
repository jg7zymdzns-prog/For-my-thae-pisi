<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Thae</title>
    <style>
        body {
            background-color: #000;
            color: #ff6b81;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* နှလုံးသားလေးတွေအတွက် style - အရေအတွက် ပိုများလာအောင် ပြင်ထားတယ် */
        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 20px;
            top: -10%;
            z-index: 0;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container { z-index: 2; position: relative; }

        .message {
            font-size: 2.8rem;
            display: none;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 107, 129, 0.5);
            animation: fadeInOut 2s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .photo {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border: 3px solid #ff6b81;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 107, 129, 0.3);
        }

        /* YouTube သီချင်းကို ဖျောက်ထားဖို့ */
        #music-player {
            position: absolute;
            width: 0;
            height: 0;
            border: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <iframe id="music-player" 
        src="https://www.youtube.com/embed/fA_Gf8z24yM?autoplay=1&start=43" 
        allow="autoplay">
    </iframe>

    <div id="text-container">
        <h1 class="message">I'm</h1>
        <h1 class="message">Truly</h1>
        <h1 class="message">Sorry</h1>
        <h1 class="message">My</h1>
        <h1 class="message">Thae"</h1>
        <h1 class="message">Pisi ly</h1>
    </div>

    <div id="photo-album" class="photo-grid" style="display:none;">
        <img src="img1.jpg" class="photo">
        <img src="img2.jpg" class="photo">
        <img src="img3.jpg" class="photo">
        <img src="img4.jpg" class="photo">
    </div>

    <script>
        // နှလုံးသားလေးတွေ ပိုများလာအောင် setInterval ကို 150ms (အရင်ကထက် ၂ ဆမြန်) လုပ်ထားတယ်
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            // အသဲပုံစံအမျိုးမျိုး ရောထည့်ထားတယ်
            const heartTypes = ['❤️', '💖', '💗', '💕'];
            heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.opacity = Math.random() * 0.8 + 0.2;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 150); 

        const messages = document.querySelectorAll('.message');
        const album = document.getElementById('photo-album');
        const textContainer = document.getElementById('text-container');
        let delay = 0;

        messages.forEach((msg, index) => {
            setTimeout(() => {
                msg.style.display = 'block';
                setTimeout(() => {
                    msg.style.display = 'none';
                    if (index === messages.length - 1) {
                        textContainer.style.display = 'none';
                        album.style.display = 'grid';
                        setTimeout(() => album.style.opacity = '1', 100);
                    }
                }, 1900);
            }, delay);
            delay += 2000;
        });
    </script>
</body>
</html>
